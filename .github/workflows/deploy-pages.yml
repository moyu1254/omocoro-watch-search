name: Deploy search site

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - outputs/omocoro-watch-search/**
      - .github/workflows/deploy-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: outputs/omocoro-watch-search

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
