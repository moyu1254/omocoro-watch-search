name: Update search index

on:
  workflow_dispatch:
    inputs:
      update_mode:
        description: "Update mode"
        type: choice
        required: true
        default: fresh
        options:
          - fresh
          - recent
          - full
  schedule:
    # Sunday 00:20 JST.
    - cron: "20 15 * * 6"
    # Sunday 03:00 JST.
    - cron: "0 18 * * 6"
    # Sunday 12:00 JST.
    - cron: "0 3 * * 0"
    # Monday 00:30 JST.
    - cron: "30 15 * * 0"
    # Tuesday-Saturday 00:30 JST.
    - cron: "30 15 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install transcript dependency
        run: python -m pip install --upgrade yt-dlp

      - name: Build index
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SITE_URL: https://omowatch.com/
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            UPDATE_MODE="${{ inputs.update_mode }}"
          elif [ "${{ github.event.schedule }}" = "30 15 * * 1-5" ]; then
            UPDATE_MODE="recent"
          else
            UPDATE_MODE="fresh"
          fi
          echo "updateMode=${UPDATE_MODE}"
          python work/scripts/build_index.py --all --update-mode "${UPDATE_MODE}" --comments-per-video 20 --retry-missing-transcripts --retry-recent-count 5

      - name: Validate index
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("outputs/omocoro-watch-search/data/search-index.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          required = {
              "videoId",
              "title",
              "url",
              "thumbnail",
              "publishedAt",
              "description",
              "tags",
              "categories",
              "chapters",
              "additionalSearchFields",
              "comments",
              "transcriptSegments",
          }
          missing = [
              (index, sorted(required - set(video)))
              for index, video in enumerate(data.get("videos", []))
              if required - set(video)
          ]
          if missing:
              raise SystemExit(f"Missing required fields: {missing[:5]}")
          if not data.get("videos"):
              raise SystemExit("No videos found")
          print(f"videos={len(data['videos'])}")
          print(f"segments={sum(len(video['transcriptSegments']) for video in data['videos'])}")
          PY

      - name: Commit updated index
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Omocoro Watch search index"
          file_pattern: outputs/omocoro-watch-search/data/search-index.json outputs/omocoro-watch-search/data/search-index.js outputs/omocoro-watch-search/index.html outputs/omocoro-watch-search/about.html outputs/omocoro-watch-search/styles.css outputs/omocoro-watch-search/videos.html outputs/omocoro-watch-search/sitemap.xml outputs/omocoro-watch-search/robots.txt
